<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Points Table | Historical Standings 2008-2025</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    /* Force instant visibility */
    .reveal {
      opacity: 1 !important;
      transform: translateY(0) !important;
      filter: none !important;
    }
    .top-nav {
      padding: 0.5rem 2rem !important; 
    }
    .standings-container {
      margin-top: 100px; /* Increased to clear fixed nav bar */
      padding-bottom: 30px;
    }
    .standings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem; /* Ultra tight */
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .season-selector-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(139, 92, 246, 0.1); /* Brighter */
      padding: 10px 20px;
      border-radius: 14px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
    }
    #seasonFilter {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      outline: none;
      text-transform: uppercase;
    }
    .table-card {
      background: rgba(15, 15, 20, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th {
      background: rgba(139, 92, 246, 0.15);
      padding: 1.2rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      font-family: 'Archivo', sans-serif;
    }
    td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 0.85rem;
      color: var(--white);
    }
    .nrr-positive { color: #10b981 !important; font-weight: 600; }
    .nrr-negative { color: #ef4444 !important; font-weight: 600; }
    
    .trophy-winner {
      color: #fbbf24;
      filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6));
      margin-right: 8px;
      animation: trophyglow 2s infinite alternate;
    }
    @keyframes trophyglow {
      from { filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.4)); }
      to { filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.9)); }
    }
    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }
    .rank-cell {
      font-weight: 800;
      color: var(--purple-light);
      width: 60px;
    }
    .team-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .nrr-cell {
      font-family: 'Courier New', monospace;
      color: var(--text-secondary);
    }
    .pts-cell {
      font-weight: 800;
      color: var(--white);
      font-size: 0.95rem; /* Shrunk from 1.1 */
    }
    .status-qualify {
      color: #10b981;
      font-size: 0.75rem;
      background: rgba(16, 185, 129, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    @media (max-width: 768px) {
      .standings-header { flex-direction: column; align-items: flex-start; }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <header class="top-nav">
    <div class="brand">
        <img src="./favicon.svg" alt="" style="width: 32px; height: 32px; border-radius: 50%;"> 
        IPL AUCTION INTELLIGENCE
    </div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/teams.html">Franchises</a>
      <a href="/points-table.html" class="active nav-highlight">🏆 Standings</a>
    </nav>
  </header>

  <div class="container standings-container">
    <div class="standings-header reveal">
      <div>
        <h1 class="section-title" style="margin-bottom: 0; font-size: 1.5rem;">IPL STANDINGS</h1>
      </div>
      <div class="season-selector-wrap">
        <i class="fa-solid fa-calendar-days" style="color: var(--purple-light);"></i>
        <select id="seasonFilter">
          <option value="2025">2025 Season</option>
          <option value="2024">2024 Season</option>
          <option value="2023">2023 Season</option>
          <option value="2022">2022 Season</option>
          <option value="2021">2021 Season</option>
          <option value="2020">2020 Season</option>
          <option value="2019">2019 Season</option>
          <option value="2018">2018 Season</option>
          <option value="2017">2017 Season</option>
          <option value="2016">2016 Season</option>
          <option value="2015">2015 Season</option>
          <option value="2014">2014 Season</option>
          <option value="2013">2013 Season</option>
          <option value="2012">2012 Season</option>
          <option value="2011">2011 Season</option>
          <option value="2010">2010 Season</option>
          <option value="2009">2009 Season</option>
          <option value="2008">2008 Season</option>
        </select>
      </div>
    </div>

    <div class="table-card reveal">
      <table id="pointsTable">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>Pld</th>
            <th>W</th>
            <th>L</th>
            <th>NRR</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="standingsBody">
          <!-- Standings will be injected here -->
        </tbody>
      </table>
    </div>

    <div class="reveal" style="padding: 0.8rem; background: rgba(139, 92, 246, 0.05); border-radius: 8px; border: 1px solid rgba(139, 92, 246, 0.1); margin-top: 0.5rem;">
        <p style="font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; margin: 0;">
            <i class="fa-solid fa-circle-info" style="color: var(--purple-light);"></i>
            Top 4 teams qualified for Playoffs.
        </p>
    </div>
  </div>

  <script>
    async function loadStandings() {
      const tbody = document.getElementById('standingsBody');
      const seasonFilter = document.getElementById('seasonFilter');

      async function fetchWithFallback(filename) {
        const paths = [`./data/${filename}`, `/data/${filename}`, `./public/data/${filename}`];
        for (const path of paths) {
          try {
            const resp = await fetch(path);
            if (resp.ok) return await resp.json();
          } catch (e) {}
        }
        throw new Error(`Data file ${filename} not found in any known path.`);
      }

      try {
        const data = await fetchWithFallback('ipl-points-table.json');
        const seasons = data.seasons;

        function render(year) {
            tbody.innerHTML = '';
            const seasonRows = seasons[year];
            
            if (!seasonRows) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 3rem;">No data available for ' + year + '</td></tr>';
                return;
            }

            seasonRows.forEach((row, idx) => {
                const tr = document.createElement('tr');
                const isTop4 = idx < 4;
                const isWinner = row.rank == 1;
                const nrrValue = parseFloat(row.nrr);
                const nrrClass = nrrValue > 0 ? 'nrr-positive' : (nrrValue < 0 ? 'nrr-negative' : '');
                
                tr.innerHTML = `
                <td class="rank-cell">${row.rank}</td>
                <td>
                    <div class="team-cell">
                    ${isWinner ? '<i class="fa-solid fa-trophy trophy-winner"></i>' : ''}
                    ${row.team}
                    ${isTop4 ? '<span class="status-qualify">Q</span>' : ''}
                    </div>
                </td>
                <td>${row.m}</td>
                <td>${row.w}</td>
                <td>${row.l}</td>
                <td class="nrr-cell ${nrrClass}">${row.nrr}</td>
                <td class="pts-cell">${row.pts}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        seasonFilter.addEventListener('change', (e) => render(e.target.value));
        render(seasonFilter.value);
      } catch (err) {
        console.error("Standings Error:", err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadStandings);
  </script>
</body>
</html>
