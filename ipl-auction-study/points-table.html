<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IPL points table history from 2008 to 2024. View final standings and playoff qualifiers." />
  <meta name="theme-color" content="#8b5cf6" />
  <title>Points Table History | IPL Auction Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏏%3C/text%3E%3C/svg%3E">
  
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .season-dropdown-container {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
    }
    .season-dropdown {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Archivo', sans-serif;
      padding: 0.6rem 2.8rem 0.6rem 1.2rem;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      min-width: 160px;
      outline: none;
    }
    .season-dropdown option {
      background: #0d0d0d;
      color: white;
      padding: 10px;
    }
    .season-dropdown:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--purple-light);
    }
    .season-dropdown-container::after {
      content: '▼';
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%) rotate(180deg);
      font-size: 0.7rem;
      color: var(--purple-light);
      pointer-events: none;
    }
    .nrr-plus { color: #4ade80 !important; font-weight: 600; }
    .nrr-minus { color: #f87171 !important; font-weight: 600; }
    
    .ipl-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .ipl-table th, .ipl-table td {
      padding: 0.5rem 0.4rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      vertical-align: middle;
      text-align: center;
    }
    .ipl-table th {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .ipl-table td:first-child, .ipl-table th:first-child { 
      width: 35px; 
      text-align: left;
      padding-left: 0.75rem;
    }
    .ipl-table td:nth-child(2), .ipl-table th:nth-child(2) { 
      width: 30%; 
      text-align: left;
    }
    .ipl-table td:last-child, .ipl-table th:last-child {
      text-align: right;
      padding-right: 1.25rem;
    }
    .team-cell {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-weight: 700;
      color: var(--white);
      font-size: 0.9rem;
    }
    .team-logo-sm {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }
    .stat-val {
      font-size: 0.9rem;
    }
    .stat-pts {
      font-weight: 900;
      color: var(--purple-light);
      font-size: 1rem;
      text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
    }
    .points-table-container {
      opacity: 1;
      transform: none;
      background: rgba(13, 13, 13, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="teams-shell">
  <header class="teams-topbar" role="banner">
    <a href="./index.html" class="teams-back-link">
      <span aria-hidden="true">←</span> Back to demo
    </a>
    <span class="teams-topbar-brand">POINTS TABLE</span>
    <nav class="topbar-nav">
       <a href="./teams.html" class="nav-link">Franchises</a>
    </nav>
  </header>

  <main id="main-content" class="container section">
    <div class="season-dropdown-container">
      <select id="seasonSelect" class="season-dropdown">
        <!-- Options populated via JS -->
      </select>
    </div>

    <div class="points-table-container">
      <table class="ipl-table" id="pointsTable">
        <thead>
          <tr>
            <th></th>
            <th>Team</th>
            <th style="text-align:right">M</th>
            <th style="text-align:right">W</th>
            <th style="text-align:right">L</th>
            <th style="text-align:right">NRR</th>
            <th style="text-align:right">Pts</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Populated via JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script type="module">
    let pointsData = null;
    let teamsMap = {};

    async function init() {
      try {
        console.log("[Points Table] Initializing fetch...");
        
        async function smartFetch(paths) {
          for (let p of paths) {
            try {
              console.log("[Points Table] Trying path:", p);
              const res = await fetch(p);
              if (res.ok) return await res.json();
            } catch (e) {}
          }
          return null;
        }

        const teamsBundle = await smartFetch([
          './data/ipl-teams-bundle.json',
          '/data/ipl-teams-bundle.json',
          './public/data/ipl-teams-bundle.json',
          '../public/data/ipl-teams-bundle.json'
        ]);

        if (!teamsBundle) {
          console.error("[Points Table] Could not load teams bundle.");
          return;
        }
        
        teamsBundle.teams.forEach(t => {
          teamsMap[t.name] = t.logoUrl;
          teamsMap[t.short_name] = t.logoUrl;
          // Comprehensive historical mapping
          if (t.id === 'dcg') { teamsMap["Deccan Chargers"] = t.logoUrl; teamsMap["DEC"] = t.logoUrl; }
          if (t.id === 'dc') { teamsMap["Delhi Daredevils"] = t.logoUrl; teamsMap["DDD"] = t.logoUrl; teamsMap["DD"] = t.logoUrl; }
          if (t.id === 'pbks') { teamsMap["Kings XI Punjab"] = t.logoUrl; teamsMap["KXIP"] = t.logoUrl; teamsMap["KXP"] = t.logoUrl; }
          if (t.id === 'srh') teamsMap["SRH"] = t.logoUrl;
          if (t.id === 'rcb') { teamsMap["Royal Challengers Bangalore"] = t.logoUrl; teamsMap["Royal Challengers Bengaluru"] = t.logoUrl; }
        });

        // Add defunct teams that might not be in the bundle or need special handling
        teamsMap["Rising Pune Supergiant"] = "https://upload.wikimedia.org/wikipedia/en/2/20/Rising_Pune_Supergiant_Logo.svg";
        teamsMap["Gujarat Lions"] = "https://upload.wikimedia.org/wikipedia/en/c/c4/Gujarat_Lions_Logo.svg";
        teamsMap["Pune Warriors India"] = "https://upload.wikimedia.org/wikipedia/en/5/50/Pune_Warriors_India_Logo.svg";
        teamsMap["Kochi Tuskers Kerala"] = "https://upload.wikimedia.org/wikipedia/en/e/ef/Kochi_Tuskers_Kerala_Logo.svg";

        pointsData = await smartFetch([
          './data/ipl-points-table.json',
          '/data/ipl-points-table.json',
          './public/data/ipl-points-table.json',
          '../public/data/ipl-points-table.json'
        ]);

        if (!pointsData) {
          console.error("[Points Table] Could not load points table data.");
          return;
        }
        console.log("[Points Table] Data loaded successfully.");
        
        const seasons = Object.keys(pointsData.seasons).sort((a,b) => b - a);
        renderSelector(seasons);
        renderTable(seasons[0]);
      } catch (e) {
        console.error("[Points Table] Runtime error:", e);
      }
    }

    function renderSelector(seasons) {
      const select = document.getElementById('seasonSelect');
      seasons.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });
      
      select.onchange = (e) => renderTable(e.target.value);
    }

    function renderTable(season) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      const teams = pointsData.seasons[season];
      teams.forEach(t => {
        const tr = document.createElement('tr');
        
        const nrrClass = t.nrr > 0 ? 'nrr-plus' : (t.nrr < 0 ? 'nrr-minus' : '');
        const nrrText = t.nrr > 0 ? `+${t.nrr.toFixed(3)}` : (t.nrr < 0 ? t.nrr.toFixed(3) : '0.000');
        
        // Match team name to logo
        let logoUrl = teamsMap[t.team] || 'https://www.google.com/s2/favicons?domain=iplt20.com&sz=32';

        tr.innerHTML = `
          <td><span class="rank-num">${t.rank}</span></td>
          <td>
            <div class="team-cell">
              <img src="${logoUrl}" class="team-logo-sm" alt="${t.team}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3233/3233483.png'">
              <span>${escapeHtml(t.team)}</span>
            </div>
          </td>
          <td class="stat-val">${t.m}</td>
          <td class="stat-val">${t.w}</td>
          <td class="stat-val">${t.l}</td>
          <td class="${nrrClass} stat-val">${nrrText}</td>
          <td class="stat-pts"><strong>${t.pts}</strong></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Helper to escape HTML and prevent injections
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
