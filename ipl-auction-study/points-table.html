<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IPL points table history from 2008 to 2024. View final standings and playoff qualifiers." />
  <meta name="theme-color" content="#8b5cf6" />
  <title>Points Table History | IPL Auction Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏏%3C/text%3E%3C/svg%3E">
  
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .season-select-wrapper {
      margin-bottom: 2.5rem;
      text-align: left;
    }
    .season-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      font-weight: 600;
    }
    .season-dropdown {
      background: none;
      border: none;
      color: var(--purple-light);
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Archivo', sans-serif;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .season-dropdown:focus {
      outline: none;
    }
    .season-dropdown-icon {
      font-size: 0.8rem;
      vertical-align: middle;
      color: var(--purple-light);
    }
    .ipl-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .ipl-table th, .ipl-table td {
      padding: 1rem 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      vertical-align: middle;
    }
    .ipl-table th {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: normal;
    }
    .ipl-table th:last-child, 
    .ipl-table td:last-child {
      text-align: right;
      padding-right: 0;
    }
    .ipl-table th:first-child,
    .ipl-table td:first-child {
      padding-left: 0;
      width: 40px;
    }
    .team-cell {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-weight: 600;
      color: var(--white);
      font-size: 1.1rem;
    }
    .team-logo-sm {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
    .rank-num {
      color: var(--text-muted);
      font-weight: 500;
      font-size: 1rem;
    }
    .stat-val {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 1rem;
    }
    .stat-pts {
      font-weight: 800;
      color: var(--white);
      font-size: 1.1rem;
    }
    .nrr-plus { color: #4ade80; }
    .nrr-minus { color: #f87171; }
    
    .nrr-plus { color: #4ade80; }
    .nrr-minus { color: #f87171; }
  </style>
</head>
<body class="teams-shell">
  <header class="teams-topbar" role="banner">
    <a href="./index.html" class="teams-back-link">
      <span aria-hidden="true">←</span> Back to demo
    </a>
    <span class="teams-topbar-brand">POINTS TABLE</span>
    <nav class="topbar-nav">
       <a href="./teams.html" class="nav-link">Franchises</a>
    </nav>
  </header>

  <main id="main-content" class="container section">
    <div class="season-select-wrapper">
      <span class="season-label">Season</span>
      <select id="seasonSelect" class="season-dropdown">
        <!-- Options populated via JS -->
      </select>
    </div>

    <div class="points-table-container reveal">
      <table class="ipl-table" id="pointsTable">
        <thead>
          <tr>
            <th></th>
            <th>Team</th>
            <th style="text-align:right">M</th>
            <th style="text-align:right">W</th>
            <th style="text-align:right">L</th>
            <th style="text-align:right">NRR</th>
            <th style="text-align:right">Pts</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Populated via JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script type="module">
    let pointsData = null;
    let teamsMap = {};

    async function init() {
      try {
        console.log("[Points Table] Initializing fetch...");
        
        // Relative to root
        const teamsUrl = '/data/ipl-teams-bundle.json';
        const pointsUrl = '/data/ipl-points-table.json';
        
        console.log("[Points Table] Fetching teams from:", teamsUrl);
        const teamsRes = await fetch(teamsUrl);
        if (!teamsRes.ok) {
           console.error("[Points Table] Teams fetch failed:", teamsRes.status);
           return;
        }
        const teamsBundle = await teamsRes.json();
        
        teamsBundle.teams.forEach(t => {
          teamsMap[t.name] = t.logoUrl;
          teamsMap[t.short_name] = t.logoUrl;
          // Comprehensive historical mapping
          if (t.id === 'dcg') { teamsMap["Deccan Chargers"] = t.logoUrl; teamsMap["DEC"] = t.logoUrl; }
          if (t.id === 'dc') { teamsMap["Delhi Daredevils"] = t.logoUrl; teamsMap["DDD"] = t.logoUrl; teamsMap["DD"] = t.logoUrl; }
          if (t.id === 'pbks') { teamsMap["Kings XI Punjab"] = t.logoUrl; teamsMap["KXIP"] = t.logoUrl; teamsMap["KXP"] = t.logoUrl; }
          if (t.id === 'srh') teamsMap["SRH"] = t.logoUrl;
          if (t.id === 'rcb') { teamsMap["Royal Challengers Bangalore"] = t.logoUrl; teamsMap["Royal Challengers Bengaluru"] = t.logoUrl; }
        });

        // Add defunct teams that might not be in the bundle or need special handling
        teamsMap["Rising Pune Supergiant"] = "https://upload.wikimedia.org/wikipedia/en/2/20/Rising_Pune_Supergiant_Logo.svg";
        teamsMap["Gujarat Lions"] = "https://upload.wikimedia.org/wikipedia/en/c/c4/Gujarat_Lions_Logo.svg";
        teamsMap["Pune Warriors India"] = "https://upload.wikimedia.org/wikipedia/en/5/50/Pune_Warriors_India_Logo.svg";
        teamsMap["Kochi Tuskers Kerala"] = "https://upload.wikimedia.org/wikipedia/en/e/ef/Kochi_Tuskers_Kerala_Logo.svg";

        console.log("[Points Table] Fetching points from:", pointsUrl);
        const res = await fetch(pointsUrl);
        if (!res.ok) {
           console.error("[Points Table] Points fetch failed:", res.status);
           return;
        }
        pointsData = await res.json();
        console.log("[Points Table] Data loaded successfully.");
        
        const seasons = Object.keys(pointsData.seasons).sort((a,b) => b - a);
        renderSelector(seasons);
        renderTable(seasons[0]);
      } catch (e) {
        console.error("[Points Table] Runtime error:", e);
      }
    }

    function renderSelector(seasons) {
      const select = document.getElementById('seasonSelect');
      seasons.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });
      
      select.onchange = (e) => renderTable(e.target.value);
    }

    function renderTable(season) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      const teams = pointsData.seasons[season];
      teams.forEach(t => {
        const tr = document.createElement('tr');
        
        const nrrClass = t.nrr > 0 ? 'nrr-plus' : (t.nrr < 0 ? 'nrr-minus' : '');
        const nrrText = t.nrr > 0 ? `+${t.nrr.toFixed(3)}` : (t.nrr < 0 ? t.nrr.toFixed(3) : '0.000');
        
        // Match team name to logo
        let logoUrl = teamsMap[t.team] || '';
        
        // Simple abbreviation for the label
        const abbr = t.team.split(' ').map(w => w[0]).join('').substring(0,4);

        tr.innerHTML = `
          <td><span class="rank-num">${t.rank}</span></td>
          <td>
            <div class="team-cell">
              <img src="${logoUrl}" class="team-logo-sm" alt="">
              <span>${escapeHtml(t.team)}</span>
            </div>
          </td>
          <td style="text-align:right" class="stat-val">${t.m}</td>
          <td style="text-align:right" class="stat-val">${t.w}</td>
          <td style="text-align:right" class="stat-val">${t.l}</td>
          <td style="text-align:right" class="${nrrClass} stat-val">${nrrText}</td>
          <td style="text-align:right" class="stat-pts"><strong>${t.pts}</strong></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Helper to escape HTML and prevent injections
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
