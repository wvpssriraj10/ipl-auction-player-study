<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Points Table | Historical Standings 2008-2025</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    .standings-container {
      margin-top: 100px;
      padding-bottom: 80px;
    }
    .standings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .season-selector-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.03);
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    #seasonFilter {
      background: transparent;
      border: none;
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }
    .table-card {
      background: rgba(15, 15, 20, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th {
      background: rgba(139, 92, 246, 0.1);
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 1.5rem 1.2rem;
      font-family: 'Archivo', sans-serif;
    }
    td {
      padding: 1.2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      font-size: 0.95rem;
      color: var(--white);
    }
    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }
    .rank-cell {
      font-weight: 800;
      color: var(--purple-light);
      width: 60px;
    }
    .team-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .nrr-cell {
      font-family: 'Courier New', monospace;
      color: var(--text-secondary);
    }
    .pts-cell {
      font-weight: 800;
      color: var(--white);
      font-size: 1.1rem;
    }
    .status-qualify {
      color: #10b981;
      font-size: 0.75rem;
      background: rgba(16, 185, 129, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    @media (max-width: 768px) {
      .standings-header { flex-direction: column; align-items: flex-start; }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <header class="top-nav">
    <div class="brand">
        <img src="/favicon.svg" alt="" style="width: 32px; height: 32px; border-radius: 50%;"> 
        IPL AUCTION INTELLIGENCE
    </div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/teams.html">Franchises</a>
      <a href="/points-table.html" class="active nav-highlight">🏆 Standings</a>
    </nav>
  </header>

  <div class="container standings-container">
    <div class="standings-header reveal">
      <div>
        <h1 class="section-title" style="margin-bottom: 0;">IPL STANDINGS</h1>
        <p class="hero-sub" style="font-size: 1rem; opacity: 0.6;">Historical league positions and Net Run Rates (NRR).</p>
      </div>
      <div class="season-selector-wrap">
        <i class="fa-solid fa-calendar-days" style="color: var(--purple-light);"></i>
        <select id="seasonFilter">
          <option value="2025">2025 Season</option>
          <option value="2024">2024 Season</option>
          <option value="2023">2023 Season</option>
          <option value="2022">2022 Season</option>
          <option value="2021">2021 Season</option>
          <option value="2020">2020 Season</option>
          <option value="2019">2019 Season</option>
          <option value="2018">2018 Season</option>
          <option value="2017">2017 Season</option>
          <option value="2016">2016 Season</option>
          <option value="2015">2015 Season</option>
          <option value="2014">2014 Season</option>
          <option value="2013">2013 Season</option>
          <option value="2012">2012 Season</option>
          <option value="2011">2011 Season</option>
          <option value="2010">2010 Season</option>
          <option value="2009">2009 Season</option>
          <option value="2008">2008 Season</option>
        </select>
      </div>
    </div>

    <div class="table-card reveal">
      <table id="pointsTable">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>Pld</th>
            <th>W</th>
            <th>L</th>
            <th>NRR</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="standingsBody">
          <!-- Standings will be injected here -->
        </tbody>
      </table>
    </div>

    <div class="reveal" style="padding: 1.5rem; background: rgba(139, 92, 246, 0.05); border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.1);">
        <p style="font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-circle-info" style="color: var(--purple-light);"></i>
            Top 4 teams in each season qualified for the Playoffs / Semi-Finals.
        </p>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 IPL Auction Intelligence. Data-driven sport analysis.</p>
    </div>
  </footer>

  <script>
    async function loadStandings() {
      const resp = await fetch('/data/ipl-points-table.json');
      const allData = await resp.json();
      const seasonFilter = document.getElementById('seasonFilter');
      const tbody = document.getElementById('standingsBody');

      function render(year) {
        tbody.innerHTML = '';
        const seasonData = allData.find(s => s.season == year);
        if (!seasonData || !seasonData.table) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 3rem;">No data available for this season.</td></tr>';
          return;
        }

        seasonData.table.forEach((row, idx) => {
          const tr = document.createElement('tr');
          const isTop4 = idx < 4;
          tr.innerHTML = `
            <td class="rank-cell">${idx + 1}</td>
            <td>
              <div class="team-cell">
                ${row.team}
                ${isTop4 ? '<span class="status-qualify">Q</span>' : ''}
              </div>
            </td>
            <td>${row.played}</td>
            <td>${row.won}</td>
            <td>${row.lost}</td>
            <td class="nrr-cell">${row.nrr}</td>
            <td class="pts-cell">${row.points}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      seasonFilter.addEventListener('change', (e) => render(e.target.value));
      render(seasonFilter.value);
    }

    document.addEventListener('DOMContentLoaded', loadStandings);

    // Initial reveal animation logic
    window.addEventListener('scroll', () => {
        document.querySelectorAll('.reveal').forEach(el => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight * 0.9) {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }
        });
    });
  </script>
</body>
</html>
