<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Ball Body -->
  <circle cx="256" cy="256" r="230" fill="url(#logoGrad)" filter="url(#glow)" />
  
  <!-- Analytics Graph Seam -->
  <path d="M120 320 L180 260 L240 290 L320 200 L390 240" 
        stroke="white" 
        stroke-width="24" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9" />
  
  <!-- Subtle Ball Highlights -->
  <path d="M100 150 A180 180 0 0 1 400 150" fill="none" stroke="white" stroke-width="8" opacity="0.2" />
  <path d="M100 360 A180 180 0 0 0 400 360" fill="none" stroke="white" stroke-width="8" opacity="0.2" />
  
  <!-- Center Point (The Target) -->
  <circle cx="320" cy="200" r="16" fill="white" />
</svg>