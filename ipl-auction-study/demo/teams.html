<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IPL franchise profiles — teams, history, honours, and imagery." />
  <meta name="theme-color" content="#8b5cf6" />
  <title>IPL Teams | IPL Auction Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="teams-shell">
  <a href="./index.html" class="skip-to-main">Skip to main content</a>

  <header class="teams-topbar" role="banner">
    <a href="./index.html" class="teams-back-link">
      <span aria-hidden="true">←</span> Back to demo
    </a>
    <span class="teams-topbar-brand">IPL TEAMS</span>
    <span class="teams-topbar-spacer" aria-hidden="true"></span>
  </header>

  <main id="main-content" class="teams-main container section">
    <h1 class="section-title teams-page-h1">Franchise profiles</h1>
    <p class="ipl-teams-lede teams-page-lede">
      Choose a franchise to read its profile. Backgrounds are scaled to cover, lightly blurred, and dimmed so text stays readable.
    </p>

    <div class="ipl-teams-layout teams-page-layout">
      <div
        id="iplTeamsGrid"
        class="ipl-teams-grid"
        role="tablist"
        aria-label="IPL franchises"
      ></div>
      <div
        id="iplTeamsDetail"
        class="ipl-teams-detail"
        role="tabpanel"
        aria-live="polite"
        aria-label="Selected team details"
      ></div>
    </div>
    <p id="iplTeamsError" class="ipl-teams-error hidden" role="alert"></p>
  </main>

  <script type="module" src="./teams-page.js"></script>
</body>
</html>
